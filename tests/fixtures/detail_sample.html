        <h1>江苏省2026年应届优秀大学毕业生选调工作公告</h1>
        <div class="info">
            <span class="date">发布日期：2026年06月15日</span>
            <span class="source">来源：江苏省委组织部</span>
        </div>
        <div class="content">
            <p>为深入贯彻落实新时代党的建设总要求，加强江苏高素质专业化年轻干部队伍建设，
            经研究，决定2026年面向部分高校选调一批优秀大学毕业生。</p>
            <p>招聘单位：中共江苏省委组织部。</p>
            <p>报名截止时间：至2026年7月10日。</p>
            <p>选调职位共500名，包含省市机关、县（市、区）机关和乡镇（街道）机关。</p>
        </div>
